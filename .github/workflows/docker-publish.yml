name: Publish Docker Image

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: admin-docker-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/dujiao-next-admin

jobs:
  publish:
    name: Build and push
    runs-on: ubuntu-latest
    outputs:
      image_name: ${{ steps.refs.outputs.image_name }}
      ref_tag: ${{ steps.refs.outputs.ref_tag }}
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Record published image refs
        id: refs
        shell: bash
        run: |
          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "ref_tag=${IMAGE_NAME}:${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "Published tags:"
          printf '%s\n' "${{ steps.meta.outputs.tags }}"
          echo "Digest: ${{ steps.build.outputs.digest }}"

      - name: Verify published image tags
        shell: bash
        run: |
          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            for attempt in 1 2 3 4 5; do
              if docker buildx imagetools inspect "$tag" >/dev/null 2>&1; then
                break
              fi
              if [ "$attempt" -eq 5 ]; then
                echo "Failed to verify published tag: $tag" >&2
                exit 1
              fi
              sleep 5
            done
          done <<'EOF'
          ${{ steps.meta.outputs.tags }}
          EOF
